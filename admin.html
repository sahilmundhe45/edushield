<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body{margin:0;font-family:Inter;background:#f5f7fb;}
.section{padding:20px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.card{background:white;padding:20px;border-radius:10px;}
table{width:100%;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #ddd;}
</style>
</head>

<body>

<div class="section">
<h2>Admin Dashboard</h2>

<div class="grid">
<div class="card">Users: 1200</div>
<div class="card">Courses: 50</div>
<div class="card">Revenue: ₹5L</div>
</div>

<h3>Transactions</h3>
<table>
<tr><th>User</th><th>Amount</th></tr>
<tr><td>Rahul</td><td>₹999</td></tr>
</table>

</div>

</body>
</html>
