<!DOCTYPE html>
<html>
<head>

body{margin:0;font-family:Inter;background:#f5f7fb;}
.container{display:flex;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:white;padding:15px;border-radius:10px;}
button{background:#00bfa6;color:white;padding:8px;border:none;}
</style>
</head>

<body>

<div class="container">
<div class="sidebar">
<h3>Filters</h3>
<p>Price</p>
<p>Rating</p>
<p>Category</p>
</div>

<div class="content">
<h2>Courses</h2>
<div class="grid">
<div class="card"><h3>Web Security</h3><button>Enroll</button></div>
<div class="card"><h3>Ethical Hacking</h3><button>Enroll</button></div>
</div>
</div>
</div>

</body>
</html>
